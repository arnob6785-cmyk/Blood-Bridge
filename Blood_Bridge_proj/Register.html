<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bridge - Register</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center py-5">

    <div class="card shadow-lg p-4 my-5" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><a href="index.html" class="text-danger text-decoration-none">Blood Bridge</a></h2>
            <p class="text-muted">Join us and help save lives today.</p>
        </div>
        
        <!-- Added an ID to the form so JavaScript can watch it -->
        <form id="registrationForm">
            <!-- Full Name Box (Acts as Admin Keyhole) -->
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required placeholder="John Doe">
            </div>

            <!-- Role Selector -->
            <div class="mb-3">
                <label for="userRole" class="form-label fw-bold text-danger">I want to register as a:</label>
                <select class="form-select border-danger" id="userRole" required>
                    <option value="" selected disabled>Choose your role...</option>
                    <option value="donor">Blood Donor (I want to save lives)</option>
                    <option value="recipient">Blood Recipient (I need emergency assistance)</option>
                </select>
            </div>

            <!-- Blood Group & Email Row -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Blood Group</label>
                    <select class="form-select" required>
                        <option value="" selected disabled>Choose...</option>
                        <option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option>
                        <option>O+</option><option>O-</option>
                        <option>AB+</option><option>AB-</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com">
                </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 mb-3">Create Account</button>
        </form>

        <div class="text-center">
            <p class="mb-0 text-muted">Already have an account? <a href="login.html" class="text-danger text-decoration-none fw-bold">Login here</a></p>
        </div>
    </div>

    <!-- The Secret Admin Link Script -->
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Stop the page from standard refreshing

            // Get whatever value they typed into the Full Name box
            const nameValue = document.getElementById('fullName').value.trim();

            // CHOOSE YOUR SECRET KEYWORD HERE:
            if (nameValue === "Admin-Bridge") {
                alert("👑 Admin Code Accepted! Redirecting to Admin Dashboard...");
                window.location.href = "admin.html"; // Redirects to admin panel
            } else {
                alert("Registration successful! Redirecting to login page...");
                window.location.href = "login.html"; // Normal user path
            }
        });
    </script>

</body>
</html>
